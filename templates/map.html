<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myanmar Flood &amp; Cholera Risk Map</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/map.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='lib/leaflet.css') }}">
    <script src="{{ url_for('static', filename='lib/leaflet.js') }}"></script>
</head>

<body class="app-column">

    <header id="top-bar">
        <a href="/"><button class="back-btn">← Back</button></a>
        <h1>Myanmar Flood &amp; Cholera Risk Map</h1>
        <div class="header-legend">
            <span class="legend-dot high"></span>HIGH
            <span class="legend-dot medium"></span>MEDIUM
            <span class="legend-dot low"></span>LOW
        </div>
    </header>

    <div id="map-container">
        <main id="map"></main>

        <!-- Info panel shown on region click -->
        <aside id="info-panel" class="hidden">
            <button id="close-panel">✕</button>
            <h2 id="panel-name">—</h2>
            <div class="panel-badge" id="panel-badge">—</div>

            <div class="panel-score-row">
                <div class="panel-score-box">
                    <div class="score-label">Vaccine Priority Score</div>
                    <div class="score-value" id="panel-priority-score">—</div>
                    <div class="score-bar-wrap"><div class="score-bar" id="panel-score-bar"></div></div>
                </div>
            </div>

            <table class="panel-table">
                <tr>
                    <td>Flood Risk</td>
                    <td id="panel-flood"></td>
                </tr>
                <tr>
                    <td>Cholera Risk</td>
                    <td id="panel-cholera"></td>
                </tr>
                <tr>
                    <td>People Affected</td>
                    <td id="panel-pop"></td>
                </tr>
                <tr>
                    <td>Last Major Flood</td>
                    <td id="panel-flood-date"></td>
                </tr>
            </table>

            <p id="panel-description" class="panel-desc"></p>
        </aside>

        <!-- Floating legend -->
        <div id="legend">
            <div class="legend-title">Vaccine Priority</div>
            <div class="legend-item"><span class="legend-swatch high"></span> HIGH (Score ≥ 70)</div>
            <div class="legend-item"><span class="legend-swatch medium"></span> MEDIUM (Score 40–69)</div>
            <div class="legend-item"><span class="legend-swatch low"></span> LOW (Score &lt; 40)</div>
            <hr>
            <div class="legend-item"><span class="legend-swatch no-data"></span> No data</div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/map.js') }}"></script>

</body>
</html>
